name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev cmake libffi-dev libssl-dev libltdl-dev

      - name: Install buildozer and Cython
        run: pip install 'buildozer>=1.5' 'cython>=3' pillow

      - name: Cache buildozer downloads
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-kivy-v1-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-kivy-v1-

      - name: Patch build_dir for CI runner
        run: |
          # Local spec uses /home/kakoritz which doesn't exist in CI.
          # Override to the runner's home directory.
          sed -i 's|build_dir = /home/kakoritz/.weatherapp-build|build_dir = /home/runner/.weatherapp-build|' buildozer.spec

      - name: Generate assets (icon + presplash)
        run: python create_assets.py

      - name: Build debug APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          retention-days: 7

      - name: Delete previous APK release assets
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const apkRelease = releases.data.find(r => r.tag_name === 'apk-latest');
            if (apkRelease) {
              for (const asset of apkRelease.assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            }

      - name: Publish APK to GitHub Release (latest only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Weather — Latest Android APK"
          body: |
            Built from `${{ github.ref_name }}` · commit `${{ github.sha }}`

            Install: download the APK, transfer to your Android device, and open it.
            Enable "Install from unknown sources" if prompted.
          files: bin/*.apk
          prerelease: true
          make_latest: true
