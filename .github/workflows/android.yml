name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev cmake libffi-dev libssl-dev libltdl-dev \
            libcairo2-dev python3-dev apksigner

      - name: Install buildozer and tools
        run: pip install 'buildozer>=1.5' 'cython==0.29.37' pillow cairosvg

      - name: Cache buildozer downloads
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-kivy-py311-v4-${{ hashFiles('buildozer.spec', 'custom_recipes/**') }}
          restore-keys: |
            buildozer-kivy-py311-v4-

      - name: Clone p4a pinned to Python 3.11.13 era (commit 3762c88c)
        run: |
          git clone --depth=200 https://github.com/kivy/python-for-android.git ~/.p4a-py311
          cd ~/.p4a-py311 && git checkout 3762c88c

      - name: Patch p4a recipe.py for no-isolation + dist-info cleanup
        run: python ci_patch_p4a.py

      - name: Patch buildozer.spec for CI environment
        run: |
          sed -i 's|build_dir = /home/kakoritz/.weatherapp-build|build_dir = /home/runner/.weatherapp-build|' buildozer.spec
          sed -i 's|p4a.source_dir.*=.*|p4a.source_dir = /home/runner/.p4a-py311|' buildozer.spec

      - name: Generate assets (icon + presplash + weather icons)
        run: python create_assets.py

      - name: Build release APK
        run: |
          set -o pipefail
          buildozer -v android release 2>&1 | tee build.log

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf '%s' "$KEYSTORE_B64" | tr -d '\n\r ' | base64 -d > weatherbird.jks
          UNSIGNED=$(ls bin/*-release-unsigned.apk | head -1)
          SIGNED="${UNSIGNED//-release-unsigned/-release}"
          apksigner sign \
            --ks weatherbird.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KS_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "$SIGNED" \
            "$UNSIGNED"
          rm weatherbird.jks

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          retention-days: 7

      - name: Read app version
        id: appver
        run: echo "version=$(grep '^version' buildozer.spec | sed 's/.*=\s*//' | tr -d ' \r')" >> "$GITHUB_OUTPUT"

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.appver.outputs.version }}
          name: "WeatherApp v${{ steps.appver.outputs.version }}"
          body: |
            Built from `${{ github.ref_name }}` · commit `${{ github.sha }}`

            Install: download the APK, transfer to your Android device, and open it.
            Enable "Install from unknown sources" if prompted.
          files: bin/*-release.apk
          prerelease: true
          make_latest: true
